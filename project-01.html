    /* ── SIDEBAR ── */
    .sidebar {

    .sb-nav  { display: flex; flex-direction: column; gap: 20px; margin-top: auto; margin-bottom: auto; width: 100%; }
    .nav-link {
      font-size: 15px; font-weight: 400;
      color: #242424; text-decoration: none;
      transition: opacity .15s; text-align: center; display: block;
    }
    .nav-link:hover, .nav-link.active { opacity: .45; }
    .sb-contacts { margin-top: auto; display: flex; flex-direction: column; gap: 14px; align-items: center; }
    .sb-contacts-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .sb-icon-btn {
      width: 36px; height: 36px;
      border: 1px solid rgba(36,36,36,0.22); border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none; color: #242424;
      transition: border-color .18s, color .18s; cursor: var(--cursor);
    }
    .sb-icon-btn:hover { border-color: #242424; color: #000; }
    .sb-phone {
      text-decoration: none; color: #242424;
      font-size: 13px; font-weight: 400; opacity: 0.45;
      transition: opacity .18s; text-align: center;
    }

    /* ── MAIN ── */
    .main {
      flex: 1; overflow-x: hidden; overflow-y: auto;
      background: #fff;
      display: flex; flex-direction: column; align-items: center;
    }
    .sections {
      width: 100%; max-width: 1280px;
      margin: 0 auto;
      display: flex; flex-direction: column;
    }
    .section-img {
      display: block; width: 100%; height: auto;
      image-rendering: auto;
