name: Deploy Rugby Academy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'regbi/**'
      - '.github/workflows/deploy-regbi.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy regbi folder to gh-pages
        run: |
          mkdir -p gh-pages/regbi
          cp -r regbi/* gh-pages/regbi/

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add regbi/
          git diff --staged --quiet || git commit -m "deploy: update Rugby Academy landing page"
          git push origin gh-pages
