<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Li Chu — Portfolio Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }
    #root { display: flex; width: 100%; height: 100%; }

    /* ── SIDEBAR — Figma: bg #dcdcdc ── */
    #sidebar {
      width: 260px; min-width: 260px; height: 100vh;
      background: #dcdcdc; overflow: visible;
      position: relative; z-index: 20;
    }
    .sb-profile { position: absolute; left: 30px; top: 44px; width: 200px; display: flex; flex-direction: column; align-items: flex-start; }
    .sb-name { font-weight: 700; font-size: 60px; color: #292626; line-height: 1; }
    .sb-job  { font-weight: 400; font-size: 28px; color: #98999c; white-space: nowrap; margin-top: 6px; }
    #nav {
      position: absolute; left: 85px; top: 287px; width: 89px;
      display: flex; flex-direction: column; gap: 24px;
      opacity: 0; pointer-events: none; transform: translateY(12px);
      transition: opacity 0.45s cubic-bezier(0.22,1,0.36,1), transform 0.45s cubic-bezier(0.22,1,0.36,1);
    }
    #nav.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    #nav a { font-weight: 400; font-size: 20px; color: #98999c; text-decoration: none; display: block; }

    /* ── GAME AREA — Figma: bg #242424 ── */
    #game-area { flex: 1; position: relative; background: #242424; overflow: hidden; }

    #photo-el {
      position: absolute; width: 264px; height: 293px;
      border-radius: 4px; overflow: hidden;
      background: rgba(220,220,220,0.2);
      z-index: 9; pointer-events: none; will-change: left, top;
    }
    #photo-el img {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      width: 359px; height: auto; min-height: 100%;
      object-fit: cover; filter: grayscale(1); display: block;
    }
    #photo-el .ph-ov { position: absolute; inset: 0; background: rgba(0,0,0,0.2); }

    #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: none; }

    /* ── GAME OVER MODAL — Figma: bg #e6e9e7, 475x305, radius 8, white glow ── */
    #modal-go { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; z-index: 100; }
    #modal-go.show { display: flex; }
    .go-box {
      width: 475px; height: 305px; background: #e6e9e7;
      border-radius: 8px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 250px 0 #f7f7f7, 0 0 181px 0 #f7f7f7,
                  0 0 106px 0 #f7f7f7, 0 0 53px 0 #f7f7f7,
                  0 0 15px 0 #f7f7f7, 0 0 8px 0 #f7f7f7;
      animation: popIn 0.28s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .go-inner { width: 353px; display: flex; flex-direction: column; align-items: flex-start; gap: 40px; }
    .go-title { font-weight: 600; font-size: 64px; color: #3d3d3d; line-height: normal; white-space: nowrap; }
    #play-again-btn {
      width: 353px; background: #292e2a; border-radius: 8px; border: none; padding: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.18s;
    }
    #play-again-btn:hover { background: #363d37; }
    #play-again-btn span { font-weight: 500; font-size: 32px; color: #e6e9e7; white-space: nowrap; font-family: 'Inter', sans-serif; }

    /* ── CONTACT MODAL ── */
    #modal-ct { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.45); z-index: 110; }
    #modal-ct.show { display: flex; }
    .ct-box { width: 420px; background: #2c2c2c; border-radius: 8px; padding: 44px; display: flex; flex-direction: column; gap: 16px; animation: popIn 0.28s cubic-bezier(0.22,1,0.36,1) forwards; }
    .ct-title { font-weight: 600; font-size: 28px; color: #e6e9e7; margin-bottom: 4px; }
    .ct-box input, .ct-box textarea { background: #3a3a3a; border: 1px solid #555; border-radius: 4px; padding: 10px 14px; color: #e6e9e7; font-family: 'Inter',sans-serif; font-size: 16px; outline: none; width: 100%; transition: border-color 0.15s; }
    .ct-box input:focus, .ct-box textarea:focus { border-color: #f5f5f5; }
    .ct-box textarea { height: 80px; resize: none; }
    .ct-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .ct-cancel { padding: 10px 22px; border-radius: 4px; border: 1px solid #555; background: transparent; color: #98999c; font-family: 'Inter',sans-serif; font-size: 15px; cursor: pointer; }
    .ct-send   { padding: 10px 28px; border-radius: 4px; border: none; background: #f5f5f5; color: #1a1a1a; font-family: 'Inter',sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }

    /* ── Lives ── */
    #lives-display { position: absolute; top: 18px; right: 18px; z-index: 15; display: flex; gap: 8px; pointer-events: none; }
    .life-dot { width: 12px; height: 12px; border-radius: 50%; background: #f5f5f5; transition: opacity 0.25s, background 0.25s; }
    .life-dot.lost { opacity: 0.18; }
  </style>
</head>
<body>

  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="noiseF" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
        <feComposite in="blended" in2="SourceGraphic" operator="in"/>
      </filter>
    </defs>
  </svg>

  <div id="root">
    <div id="sidebar">
      <div class="sb-profile">
        <p class="sb-name">Li Chu</p>
        <p class="sb-job">UX UI Designer</p>
      </div>
      <nav id="nav">
        <a href="#">About</a>
        <a href="#">Project 1</a>
        <a href="#">Project 2</a>
        <a href="#">Project 3</a>
        <a href="#">Project 4</a>
        <a href="#">Project 5</a>
      </nav>
    </div>

    <div id="game-area">
      <div id="photo-el">
        <img src="https://www.figma.com/api/mcp/asset/57af1af0-251e-488c-9f81-8cf2bd9dcf69" alt="Li Chu">
        <div class="ph-ov"></div>
      </div>
      <div id="lives-display">
        <div class="life-dot" id="life0"></div>
        <div class="life-dot" id="life1"></div>
        <div class="life-dot" id="life2"></div>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="modal-go">
        <div class="go-box">
          <div class="go-inner">
            <p class="go-title">Game over!</p>
            <button id="play-again-btn" style="filter:url(#noiseF)"><span>Play again</span></button>
          </div>
        </div>
      </div>
      <div id="modal-ct">
        <div class="ct-box">
          <p class="ct-title">Contact Li Chu</p>
          <input type="text" placeholder="Your name">
          <input type="email" placeholder="your@email.com">
          <textarea placeholder="Tell me about your project…"></textarea>
          <div class="ct-row">
            <button class="ct-cancel" id="ct-cancel">Cancel</button>
            <button class="ct-send"   id="ct-send">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   GAME — pixel-perfect Figma new design
   ═══════════════════════════════════════════════════════════════════ */

/* ── CONSTANTS ── */
const SIDEBAR_W  = 260;
const CARD_W     = 82,   CARD_H   = 38;   /* Figma: ~82x38 */
const PAD_SZ     = 80;                    /* Cart icon 80x80 */
const PHOTO_W    = 264,  PHOTO_H  = 293;
const CARD_SPD   = 170;  /* chaotic base speed */
const FALL_GRAV  = 90;   /* falling card gravity px/s² */
const FALL_VX    = 55;   /* max horizontal speed for falling card */
const CARD_DRIFT = 8;    /* gentle vertical drift for chaotic cards */
const PHOTO_SPD  = 115;
const MAX_LIVES  = 3;

/* ── DOM ── */
const canvas  = document.getElementById('game-canvas');
const ctx     = canvas.getContext('2d');
const photoEl = document.getElementById('photo-el');
const modalGO = document.getElementById('modal-go');
const modalCT = document.getElementById('modal-ct');
const navEl   = document.getElementById('nav');
const lifeEls = [0,1,2].map(i => document.getElementById('life'+i));

/* ── STATE ── */
let W=0, H=0, mouseX=-9999, gameOver=false, cardsOn=false, photoHit=false, lastTs=0, lives=MAX_LIVES;
const paddle = { x:0, y:0, w:PAD_SZ, h:PAD_SZ };
let cards=[], photo=null, parts=[];

let iconFontReady = false;
document.fonts.ready.then(() => { iconFontReady = true; });

/* ── HELPERS ── */
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const lerp  = (a,b,t)   => a + (b-a)*t;

function hitTest(a,b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,   x+w,y+r,  r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h, x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,   x,y+h-r,  r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,     x+r,y,    r); ctx.closePath();
}

function beep(freq,dur) {
  try {
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.value=freq||820; osc.type='sine';
    g.gain.setValueAtTime(0.08,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(dur||0.09));
    osc.start(); osc.stop(ac.currentTime+(dur||0.09));
  } catch(e) {}
}

/* ── PARTICLES ── */
function burst(cx,cy,colors,n) {
  n=n||14;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=160+Math.random()*260, life=0.5+Math.random()*0.3;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,sz:3+Math.random()*5,col:colors[Math.floor(Math.random()*colors.length)],life,max:life});
  }
}

function missExplosion(cx,cy) {
  const colors=['#242424','#1a1a1a','#3a3a3a','#f5f5f5','#ffffff','#dcdcdc','#8f8f90','#b0b0b0'];
  for(let i=0;i<70;i++){
    const a=-Math.PI+Math.random()*Math.PI, s=280+Math.random()*560, life=0.55+Math.random()*0.55;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-80,sz:5+Math.random()*15,col:colors[Math.floor(Math.random()*colors.length)],life,max:life});
  }
  const ga = document.getElementById('game-area');
  ga.style.transition='none';
  ga.style.transform='translate(8px,5px)';
  setTimeout(()=>{ga.style.transform='translate(-6px,-4px)';},50);
  setTimeout(()=>{ga.style.transform='translate(5px,-5px)';},100);
  setTimeout(()=>{ga.style.transform='translate(-3px,3px)';},150);
  setTimeout(()=>{ga.style.transform='translate(0,0)'; ga.style.transition='';},200);
}

/* ── LIVES ── */
function updateLivesUI() {
  lifeEls.forEach((el,i) => el.classList.toggle('lost', i >= lives));
}
function loseLife() {
  lives = Math.max(0, lives-1);
  updateLivesUI();
  if(lives <= 0) setTimeout(endGame, 400);
}

/* ── INIT CARDS ── */
function initCards() {
  cards = [];
  /* Card 0: FALLING — gravity, respawns from top on miss */
  cards.push({
    x:   W*0.3 + Math.random()*W*0.4 - CARD_W/2,
    y:   -CARD_H - 20,
    vx:  (Math.random()-0.5)*FALL_VX*2,
    vy:  50 + Math.random()*40,
    w:   CARD_W, h: CARD_H,
    flash: 0, falling: true
  });
  /* Cards 1-6: CHAOTIC — bounce all 4 walls */
  const xs=[0.12,0.35,0.58,0.72,0.88,0.22];
  const ys=[0.15,0.60,0.30,0.78,0.48,0.88];
  for(let i=0;i<6;i++){
    const sign=(i%2===0)?1:-1;
    const vx=sign*(CARD_SPD*0.7+Math.random()*CARD_SPD*0.6);
    const vy=(Math.random()-0.5)*120;
    cards.push({x:xs[i]*(W-CARD_W),y:ys[i]*(H-CARD_H),vx,vy,w:CARD_W,h:CARD_H,flash:0,falling:false});
  }
}

/* ── INIT PHOTO ── */
function initPhoto() {
  const angle = Math.PI/4 + (Math.random()-0.5)*0.5;
  photo = {
    x:  0.127*(W-PHOTO_W), y:  0.114*(H-PHOTO_H),
    vx: PHOTO_SPD*Math.cos(angle), vy: Math.abs(PHOTO_SPD*Math.sin(angle)),
    w:  PHOTO_W, h: PHOTO_H
  };
  photoEl.style.left=photo.x+'px'; photoEl.style.top=photo.y+'px'; photoEl.style.display='block';
}

/* ── GAME OVER ── */
function endGame() {
  if(gameOver) return;
  gameOver = true;
  cardsOn  = false;
  photoEl.style.display = 'none';
  modalGO.classList.add('show');
  /* Nav appears 200ms after modal, with slide-up animation */
  setTimeout(() => navEl.classList.add('show'), 200);
}

/* ── RESET ── */
function resetGame() {
  gameOver=false; cardsOn=false; photoHit=false; parts=[]; lives=MAX_LIVES;
  updateLivesUI();
  modalGO.classList.remove('show'); navEl.classList.remove('show');
  paddle.x=W/2-PAD_SZ/2; paddle.y=H-PAD_SZ-16;
  initCards(); initPhoto();
  setTimeout(()=>{ cardsOn=true; },500);
}

/* ── UPDATE ── */
function update(dt) {
  if(gameOver) return;

  /* Paddle follows mouse */
  const tx = clamp(mouseX - PAD_SZ/2, 0, W-PAD_SZ);
  paddle.x = lerp(paddle.x, tx, Math.min(1, dt*16));

  if(cardsOn) {
    for(let i=0;i<cards.length;i++){
      const c = cards[i];

      if(c.falling) {
        /* FALLING card: gravity + gentle wobble */
        c.vy += FALL_GRAV * dt;
        c.vx += (Math.random()-0.5) * 20 * dt;
        c.vx  = clamp(c.vx, -FALL_VX, FALL_VX);
        c.x += c.vx*dt; c.y += c.vy*dt;
        if(c.flash>0) c.flash-=dt;
        if(c.x<0)       { c.x=0;       c.vx= Math.abs(c.vx); }
        if(c.x+c.w>W)   { c.x=W-c.w;   c.vx=-Math.abs(c.vx); }
        /* Paddle hit */
        if(hitTest(c,paddle)){
          c.y=paddle.y-c.h-1;
          c.vy=-(120+Math.random()*80);
          const rel=(c.x+c.w/2-(paddle.x+PAD_SZ/2))/(PAD_SZ/2);
          c.vx=rel*FALL_VX*1.5+(Math.random()-0.5)*20;
          c.flash=0.22;
          burst(c.x+c.w/2,c.y+c.h/2,['#f5f5f5','#8f8f90','#dcdcdc','#ffffff']);
          beep(760+Math.random()*120,0.08);
        }
        /* Miss → explosion + lose life + respawn */
        if(c.y > H+12) {
          missExplosion(c.x+c.w/2, H-20);
          beep(160,0.4);
          loseLife();
          c.x  = W*0.2+Math.random()*W*0.6-CARD_W/2;
          c.y  = -CARD_H-10;
          c.vx = (Math.random()-0.5)*FALL_VX*2;
          c.vy = 40+Math.random()*30;
        }

      } else {
        /* CHAOTIC card: bounce all 4 walls */
        c.vy += CARD_DRIFT*dt;
        if(c.vy>  CARD_SPD*0.7) c.vy=  CARD_SPD*0.7;
        if(c.vy< -CARD_SPD*0.7) c.vy= -CARD_SPD*0.7;
        if(Math.abs(c.vx)<40)   c.vx+=(c.vx>=0?1:-1)*40;
        c.x+=c.vx*dt; c.y+=c.vy*dt;
        if(c.flash>0) c.flash-=dt;
        if(c.x<0)       { c.x=0;       c.vx= Math.abs(c.vx); }
        if(c.x+c.w>W)   { c.x=W-c.w;   c.vx=-Math.abs(c.vx); }
        if(c.y<0)       { c.y=0;        c.vy= Math.abs(c.vy); }
        if(c.y+c.h>H)   { c.y=H-c.h;   c.vy=-Math.abs(c.vy); }
        /* Paddle hit */
        if(hitTest(c,paddle)){
          c.y=paddle.y-c.h-1;
          c.vy=-(80+Math.random()*60);
          const rel=(c.x+c.w/2-(paddle.x+PAD_SZ/2))/(PAD_SZ/2);
          c.vx=rel*CARD_SPD*1.2+(Math.random()-0.5)*50;
          if(Math.abs(c.vx)<50) c.vx=(c.vx>=0?1:-1)*80;
          c.flash=0.22;
          burst(c.x+c.w/2,c.y+c.h/2,['#f5f5f5','#8f8f90','#dcdcdc','#ffffff','#98999c']);
          beep(820+Math.random()*140,0.07);
        }
      }
    }

    /* Card vs Card AABB collision */
    for(let i=0;i<cards.length;i++){
      for(let j=i+1;j<cards.length;j++){
        const a=cards[i],b=cards[j];
        if(!hitTest(a,b)) continue;
        const ox=Math.min(a.x+a.w,b.x+b.w)-Math.max(a.x,b.x);
        const oy=Math.min(a.y+a.h,b.y+b.h)-Math.max(a.y,b.y);
        if(ox<oy){
          const t=a.vx;a.vx=b.vx;b.vx=t;
          if(a.x<b.x){a.x-=ox/2+1;b.x+=ox/2+1;}else{a.x+=ox/2+1;b.x-=ox/2+1;}
        }else{
          const t=a.vy;a.vy=b.vy;b.vy=t;
          if(a.y<b.y){a.y-=oy/2+1;b.y+=oy/2+1;}else{a.y+=oy/2+1;b.y-=oy/2+1;}
        }
        a.flash=0.1; b.flash=0.1;
      }
    }
  }

  /* Photo bouncing element */
  if(photo){
    photo.x+=photo.vx*dt; photo.y+=photo.vy*dt;
    if(photo.x<0)           {photo.x=0;            photo.vx= Math.abs(photo.vx);}
    if(photo.x+photo.w>W)   {photo.x=W-photo.w;    photo.vx=-Math.abs(photo.vx);}
    if(photo.y<0)           {photo.y=0;             photo.vy= Math.abs(photo.vy);}
    if(photo.y+photo.h>H)   {photo.y=H-photo.h;    photo.vy=-Math.abs(photo.vy);}
    if(hitTest(photo,paddle)){
      if(!photoHit){
        photoHit=true; photo.vy=-Math.abs(photo.vy);
        burst(photo.x+photo.w/2,photo.y+photo.h/2,['#f5f5f5','#e6e9e7','#98999c','#dcdcdc'],22);
        beep(520,0.18); modalCT.classList.add('show');
      }
    } else { photoHit=false; }
    photoEl.style.left=photo.x+'px'; photoEl.style.top=photo.y+'px';
  }

  /* Particles */
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=360*dt; p.life-=dt*1.5;
    if(p.life<=0) parts.splice(i,1);
  }
}

/* ── DRAW ── */
function draw() {
  ctx.clearRect(0,0,W,H);

  /* Cards — Figma: bg #f5f5f5, text #252426, 15px Inter, radius 4 */
  for(const c of cards){
    ctx.fillStyle = c.flash>0 ? '#e4e40e' : '#f5f5f5';
    roundRect(c.x,c.y,CARD_W,CARD_H,4); ctx.fill();
    /* Distinguish falling card with a subtle border */
    if(c.falling && c.flash<=0){
      ctx.strokeStyle='#8f8f90'; ctx.lineWidth=1.5;
      roundRect(c.x,c.y,CARD_W,CARD_H,4); ctx.stroke();
    }
    ctx.fillStyle='#252426'; ctx.font='400 15px Inter,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Project 1', c.x+CARD_W/2, c.y+CARD_H/2);
  }

  /* Particles */
  for(const p of parts){
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.col; ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
    ctx.restore();
  }

  /* Paddle: shopping_cart icon from Material Symbols Outlined */
  if(!gameOver){
    if(iconFontReady){
      ctx.font='80px "Material Symbols Outlined"';
      ctx.fillStyle='#f5f5f5';
      ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillText('\ue8cc', paddle.x, paddle.y);
    } else {
      /* Fallback rectangle until font loads */
      ctx.fillStyle='#8f8f90';
      roundRect(paddle.x, paddle.y+55, PAD_SZ, 10, 4);
      ctx.fill();
    }
  }
}

/* ── LOOP ── */
function loop(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000, 0.025);
  lastTs=ts; update(dt); draw();
  requestAnimationFrame(loop);
}

/* ── RESIZE ── */
function resize(){
  W=window.innerWidth-SIDEBAR_W; H=window.innerHeight;
  canvas.width=W; canvas.height=H;
  paddle.y=H-PAD_SZ-16;
  paddle.x=clamp(paddle.x||(W/2-PAD_SZ/2), 0, W-PAD_SZ);
}

/* ── EVENTS ── */
document.addEventListener('mousemove', e => { mouseX=e.clientX-SIDEBAR_W; });
window.addEventListener('resize', ()=>{ resize(); paddle.y=H-PAD_SZ-16; });
document.getElementById('play-again-btn').addEventListener('click', resetGame);
document.getElementById('ct-cancel').addEventListener('click', ()=>modalCT.classList.remove('show'));
document.getElementById('ct-send').addEventListener('click',   ()=>modalCT.classList.remove('show'));
modalCT.addEventListener('click', e=>{ if(e.target===modalCT) modalCT.classList.remove('show'); });

/* ── START ── */
resize();
paddle.x=W/2-PAD_SZ/2;
updateLivesUI();
initCards(); initPhoto();
setTimeout(()=>{ cardsOn=true; }, 500);
requestAnimationFrame(loop);
</script>
</body>
</html>
