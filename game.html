/* ── Flying-cards custom text (set via admin) ── */
window.LICHU_CARD_TEXT = '';
(function () {
  var _orig = CanvasRenderingContext2D.prototype.fillText;
  CanvasRenderingContext2D.prototype.fillText = function (text, x, y, mw) {
    if (window.LICHU_CARD_TEXT && this.font &&
        this.font.indexOf('Material') !== -1 &&
        this.canvas && this.canvas.id === 'game-canvas') {
      var size = parseInt(this.font) || 0;
      if (size < 40) {
        var sf = this.font, sa = this.textAlign, sb = this.textBaseline;
        this.font = '500 13px Inter, sans-serif';
        this.textAlign = 'center';
        this.textBaseline = 'middle';
        var r = (mw != null) ? _orig.call(this, window.LICHU_CARD_TEXT, x, y, mw)
                             : _orig.call(this, window.LICHU_CARD_TEXT, x, y);
        this.font = sf; this.textAlign = sa; this.textBaseline = sb;
        return r;
      }
    }
    return (mw != null) ? _orig.call(this, text, x, y, mw) : _orig.call(this, text, x, y);
  };
})();
</script>
<script>
/* ── Always keep nav visible — patch classList.remove on #nav ── */
(function () {
  var nav = document.getElementById('nav');
  var sb  = document.getElementById('sb-contact');
  if (!nav) return;
  var _orig = nav.classList.remove.bind(nav.classList);
  nav.classList.remove = function () {
    // block hiding the nav; allow other class removals
    var args = Array.prototype.filter.call(arguments, function(c){ return c !== 'show'; });
    if (args.length) _orig.apply(null, args);
  };
  // keep sb-contact visible too
  if (sb) {
    var _origSb = sb.classList.remove.bind(sb.classList);
    sb.classList.remove = function () {
      var args = Array.prototype.filter.call(arguments, function(c){ return c !== 'show'; });
      if (args.length) _origSb.apply(null, args);
    };
  }
})();
</script>
<script>
/* ── CONSTANTS ── */
const SIDEBAR_W = 260;
const CARD_W    = 82,   CARD_H   = 38;   /* Figma: ~82x38, padding 10px, 15px font */
const PAD_W     = 80,   PAD_H    = 80;   /* Shopping cart icon 80x80 */
const PHOTO_W   = 264,  PHOTO_H  = 293;
const CARD_SPD  = 170;   /* chaotic card base speed */
const FALL_GRAV = 90;    /* gravity for falling card px/s² */
const FALL_VX   = 55;    /* max horizontal speed for falling card */
const CARD_DRIFT= 8;     /* gentle drift for chaotic cards */
const PHOTO_SPD = 115;
const MAX_LIVES = 3;

/* ── DOM ── */
const canvas  = document.getElementById('game-canvas');
const ctx     = canvas.getContext('2d');
const photoEl = document.getElementById('photo-el');
const modalGO = document.getElementById('modal-go');
const modalCT = document.getElementById('modal-ct');
const navEl   = document.getElementById('nav');
const lifeEls = [0,1,2].map(i => document.getElementById('life'+i));

/* ── STATE ── */
let W=0, H=0, mouseX=-9999, gameOver=false, cardsOn=false, photoHit=false, lastTs=0, lives=MAX_LIVES;
const paddle = { x:0, y:0, w:PAD_W, h:PAD_H };
let cards=[], photo=null, parts=[];

let iconFontReady = false;
document.fonts.ready.then(() => { iconFontReady = true; });

/* ── HELPERS ── */
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi,v));
const lerp  = (a,b,t)   => a + (b-a)*t;

function hitTest(a,b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,  x+w,y+r,  r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,  x,y+h-r,  r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,    x+r,y,    r); ctx.closePath();
}

function beep(freq,dur) {
  try {
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.value=freq||820; osc.type='sine';
    g.gain.setValueAtTime(0.08,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(dur||0.09));
    osc.start(); osc.stop(ac.currentTime+(dur||0.09));
  } catch(e){}
}

/* ── PARTICLES ── */
function burst(cx,cy,colors,n) {
  n=n||14;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=160+Math.random()*260, life=0.5+Math.random()*0.3;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,sz:3+Math.random()*5,col:colors[Math.floor(Math.random()*colors.length)],life,max:life});
  }
}

function missExplosion(cx,cy) {
  const colors=['#ff2200','#ff6600','#ffaa00','#242424','#f5f5f5','#ffffff','#8f8f90'];
  for(let i=0;i<70;i++){
    const a=-Math.PI+Math.random()*Math.PI, s=280+Math.random()*560, life=0.55+Math.random()*0.55;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-80,sz:5+Math.random()*15,col:colors[Math.floor(Math.random()*colors.length)],life,max:life});
  }
  const ga=document.getElementById('game-area');
  ga.style.transition='none';
  ga.style.transform='translate(8px,5px)';
  setTimeout(()=>{ga.style.transform='translate(-6px,-4px)';},50);
  setTimeout(()=>{ga.style.transform='translate(5px,-5px)';},100);
  setTimeout(()=>{ga.style.transform='translate(-3px,3px)';},150);
  setTimeout(()=>{ga.style.transform='translate(0,0)';ga.style.transition='';},200);
}

/* ── LIVES ── */
function updateLivesUI(){
  lifeEls.forEach((el,i)=>el.classList.toggle('lost',i>=lives));
}
function loseLife(){
  lives=Math.max(0,lives-1); updateLivesUI();
  if(lives<=0) setTimeout(endGame,400);
}

/* ── INIT CARDS ── */
function initCards(){
  cards=[];
  /* Card 0: FALLING — always falls down, respawns from top */
  cards.push({
    x: W*0.3+Math.random()*W*0.4-CARD_W/2,
    y: -CARD_H-20,
    vx:(Math.random()-0.5)*FALL_VX*2,
    vy:50+Math.random()*40,
    w:CARD_W,h:CARD_H,flash:0,falling:true
  });
  /* Cards 1-6: CHAOTIC — bounce all 4 walls */
  const xs=[0.12,0.35,0.58,0.72,0.88,0.22];
  const ys=[0.15,0.60,0.30,0.78,0.48,0.88];
  for(let i=0;i<6;i++){
    const sign=(i%2===0)?1:-1;
    const vx=sign*(CARD_SPD*0.7+Math.random()*CARD_SPD*0.6);
    const vy=(Math.random()-0.5)*120;
    cards.push({x:xs[i]*(W-CARD_W),y:ys[i]*(H-CARD_H),vx,vy,w:CARD_W,h:CARD_H,flash:0,falling:false});
  }
}

/* ── INIT PHOTO ── */
function initPhoto(){
  const angle=Math.PI/4+(Math.random()-0.5)*0.5;
  photo={
    x:0.127*(W-PHOTO_W), y:0.114*(H-PHOTO_H),
    vx:PHOTO_SPD*Math.cos(angle), vy:Math.abs(PHOTO_SPD*Math.sin(angle)),
    w:PHOTO_W, h:PHOTO_H
  };
  photoEl.style.left=photo.x+'px'; photoEl.style.top=photo.y+'px'; photoEl.style.display='block';
}

/* ── GAME OVER ── */
function endGame(){
  if(gameOver) return;
  gameOver=true; photoEl.style.display='none';
  modalGO.classList.add('show');
  setTimeout(()=>navEl.classList.add('show'),120);
}

/* ── RESET ── */
function resetGame(){
  gameOver=false; cardsOn=false; photoHit=false; parts=[]; lives=MAX_LIVES;
  updateLivesUI();
  modalGO.classList.remove('show'); navEl.classList.remove('show');
  paddle.x=W/2-PAD_W/2; paddle.y=H-PAD_H-16;
  initCards(); initPhoto();
  setTimeout(()=>{cardsOn=true;},500);
}

/* ── UPDATE ── */
function update(dt){
  if(gameOver) return;

  const tx=clamp(mouseX-PAD_W/2,0,W-PAD_W);
  paddle.x=lerp(paddle.x,tx,Math.min(1,dt*16));

  if(cardsOn){
    for(let i=0;i<cards.length;i++){
      const c=cards[i];

      if(c.falling){
        /* Falling card: gravity, gentle horizontal wobble */
        c.vy+=FALL_GRAV*dt;
        c.vx+=(Math.random()-0.5)*20*dt;
        c.vx=clamp(c.vx,-FALL_VX,FALL_VX);
        c.x+=c.vx*dt; c.y+=c.vy*dt;
        if(c.flash>0) c.flash-=dt;
        if(c.x<0)       {c.x=0;       c.vx= Math.abs(c.vx);}
        if(c.x+c.w>W)   {c.x=W-c.w;   c.vx=-Math.abs(c.vx);}
        if(hitTest(c,paddle)){
          c.y=paddle.y-c.h-1;
          c.vy=-(120+Math.random()*80);
          const rel=(c.x+c.w/2-(paddle.x+PAD_W/2))/(PAD_W/2);
          c.vx=rel*FALL_VX*1.5+(Math.random()-0.5)*20;
          c.flash=0.22;
          burst(c.x+c.w/2,c.y+c.h/2,['#ff2fda','#ff80ee','#c4009a','#ffffff']);
          beep(760+Math.random()*120,0.08);
        }
        if(c.y>H+12){
          missExplosion(c.x+c.w/2,H-20);
          beep(160,0.4);
          loseLife();
          /* Respawn from top */
          c.x=W*0.2+Math.random()*W*0.6-CARD_W/2;
          c.y=-CARD_H-10;
          c.vx=(Math.random()-0.5)*FALL_VX*2;
          c.vy=40+Math.random()*30;
        }

      } else {
        /* Chaotic cards: bounce all 4 walls */
        c.vy+=CARD_DRIFT*dt;
        if(c.vy> CARD_SPD*0.7) c.vy= CARD_SPD*0.7;
        if(c.vy<-CARD_SPD*0.7) c.vy=-CARD_SPD*0.7;
        if(Math.abs(c.vx)<40)  c.vx+=(c.vx>=0?1:-1)*40;
        c.x+=c.vx*dt; c.y+=c.vy*dt;
        if(c.flash>0) c.flash-=dt;
        if(c.x<0)         {c.x=0;       c.vx= Math.abs(c.vx);}
        if(c.x+c.w>W)     {c.x=W-c.w;   c.vx=-Math.abs(c.vx);}
        if(c.y<0)         {c.y=0;        c.vy= Math.abs(c.vy);}
        if(c.y+c.h>H)     {c.y=H-c.h;   c.vy=-Math.abs(c.vy);}
        if(hitTest(c,paddle)){
          c.y=paddle.y-c.h-1;
          c.vy=-(80+Math.random()*60);
          const rel=(c.x+c.w/2-(paddle.x+PAD_W/2))/(PAD_W/2);
          c.vx=rel*CARD_SPD*1.2+(Math.random()-0.5)*50;
          if(Math.abs(c.vx)<50) c.vx=(c.vx>=0?1:-1)*80;
          c.flash=0.22;
          burst(c.x+c.w/2,c.y+c.h/2,['#ff2fda','#ff80ee','#c4009a','#ffffff','#ff2fda']);
          beep(820+Math.random()*140,0.07);
        }
      }
    }

    /* Card vs Card collision */
    for(let i=0;i<cards.length;i++){
      for(let j=i+1;j<cards.length;j++){
        const a=cards[i],b=cards[j];
        if(!hitTest(a,b)) continue;
        const ox=Math.min(a.x+a.w,b.x+b.w)-Math.max(a.x,b.x);
        const oy=Math.min(a.y+a.h,b.y+b.h)-Math.max(a.y,b.y);
        if(ox<oy){
          const t=a.vx;a.vx=b.vx;b.vx=t;
          if(a.x<b.x){a.x-=ox/2+1;b.x+=ox/2+1;}else{a.x+=ox/2+1;b.x-=ox/2+1;}
        }else{
          const t=a.vy;a.vy=b.vy;b.vy=t;
          if(a.y<b.y){a.y-=oy/2+1;b.y+=oy/2+1;}else{a.y+=oy/2+1;b.y-=oy/2+1;}
        }
        a.flash=0.1;b.flash=0.1;
      }
    }
  }

  /* Photo */
  if(photo){
    photo.x+=photo.vx*dt; photo.y+=photo.vy*dt;
    if(photo.x<0)             {photo.x=0;            photo.vx= Math.abs(photo.vx);}
    if(photo.x+photo.w>W)     {photo.x=W-photo.w;    photo.vx=-Math.abs(photo.vx);}
    if(photo.y<0)             {photo.y=0;             photo.vy= Math.abs(photo.vy);}
    if(photo.y+photo.h>H)     {photo.y=H-photo.h;    photo.vy=-Math.abs(photo.vy);}
    if(hitTest(photo,paddle)){
      if(!photoHit){
        photoHit=true; photo.vy=-Math.abs(photo.vy);
        burst(photo.x+photo.w/2,photo.y+photo.h/2,['#f5f5f5','#e6e9e7','#98999c','#8f8f90'],22);
        beep(520,0.18); modalCT.classList.add('show');
      }
    }else{ photoHit=false; }
    photoEl.style.left=photo.x+'px'; photoEl.style.top=photo.y+'px';
  }

  /* Particles */
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=360*dt; p.life-=dt*1.5;
    if(p.life<=0) parts.splice(i,1);
  }
}

/* ── DRAW ── */
function draw(){
  ctx.clearRect(0,0,W,H);

  /* Cards — Figma: bg #f5f5f5, text #252426, Inter 15px Regular, radius 4 */
  for(const c of cards){
    ctx.fillStyle=c.flash>0?'#ff2fda':'#f5f5f5';
    roundRect(c.x,c.y,CARD_W,CARD_H,4); ctx.fill();
    /* Falling card indicator: gray border */
    if(c.falling&&c.flash<=0){
      ctx.strokeStyle='#8f8f90'; ctx.lineWidth=1.5;
      roundRect(c.x,c.y,CARD_W,CARD_H,4); ctx.stroke();
    }
    ctx.fillStyle=c.flash>0?'#1a1a1a':'#252426';
    ctx.font='400 15px Inter,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Project 1',c.x+CARD_W/2,c.y+CARD_H/2);
  }

  /* Particles */
  for(const p of parts){
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.col; ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
    ctx.restore();
  }

  /* Paddle: shopping_cart icon from Material Symbols Outlined */
  if(!gameOver){
    if(iconFontReady){
      ctx.font='80px "Material Symbols Outlined"';
      ctx.fillStyle='#f5f5f5';
      ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillText('\ue8cc',paddle.x,paddle.y);
    }else{
      /* Fallback until font loads */
      ctx.fillStyle='#8f8f90';
      roundRect(paddle.x,paddle.y+55,PAD_W,10,4); ctx.fill();
    }
  }
}

/* ── LOOP ── */
function loop(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.025);
  lastTs=ts; update(dt); draw();
  requestAnimationFrame(loop);
}

/* ── RESIZE ── */
function resize(){
  W=window.innerWidth-SIDEBAR_W; H=window.innerHeight;
  canvas.width=W; canvas.height=H;
  paddle.y=H-PAD_H-16;
  paddle.x=clamp(paddle.x||(W/2-PAD_W/2),0,W-PAD_W);
}

/* ── EVENTS ── */
document.addEventListener('mousemove',e=>{ mouseX=e.clientX-SIDEBAR_W; });
window.addEventListener('resize',()=>{ resize(); paddle.y=H-PAD_H-16; });
document.getElementById('play-again-btn').addEventListener('click',resetGame);
var ctCloseEl = document.getElementById('ct-close');
if (ctCloseEl) ctCloseEl.addEventListener('click',()=>modalCT.classList.remove('show'));
modalCT.addEventListener('click',e=>{ if(e.target===modalCT) modalCT.classList.remove('show'); });

/* ── START ── */
resize();
paddle.x=W/2-PAD_W/2;
updateLivesUI();
initCards(); initPhoto();
setTimeout(()=>{cardsOn=true;},500);
requestAnimationFrame(loop);
</script>

<script>
(function () {
  fetch('site-config.json?_=' + Date.now())
    .then(function(r){ return r.ok ? r.json() : {}; })
    .catch(function(){ return {}; })
    .then(function(cfg){
      window._LICHU_CFG = cfg;

      // Close button
  var closeBtn = document.getElementById('ct-close');
  if (closeBtn) closeBtn.addEventListener('click', function () {
    document.getElementById('modal-ct').classList.remove('show');
  });

  initContactForm();
    });
    var formspree = cfg.formspree_endpoint || '';
    var toEmail   = cfg.email || 'lapkazarapka8752@gmail.com';

    // Clone button to remove obfuscated listeners
    var oldBtn = document.getElementById('ct-send');
    if (!oldBtn) return;
    var newBtn = oldBtn.cloneNode(true);
    oldBtn.parentNode.replaceChild(newBtn, oldBtn);

    newBtn.addEventListener('click', function () {
      var box      = document.querySelector('.ct-box');
      var titleEl  = box.querySelector('.ct-title');
      var nameVal  = box.querySelector('input[type="text"]').value.trim();
      var emailVal = box.querySelector('input[type="email"]').value.trim();
      var msgVal   = box.querySelector('textarea').value.trim();

      if (!nameVal || !emailVal || !msgVal) {
        titleEl.textContent = 'Fill in all fields ✱';
        setTimeout(function () { titleEl.textContent = 'Get in touch'; }, 2000);
        return;
      }

      newBtn.innerHTML = 'Sending… <span class="arr">→</span>';
      newBtn.disabled = true;

      function onSuccess() {
        titleEl.textContent = 'Sent ✓';
        setTimeout(function () {
          document.getElementById('modal-ct').classList.remove('show');
          titleEl.textContent = 'Get in touch';
          box.querySelector('input[type="text"]').value  = '';
          box.querySelector('input[type="email"]').value = '';
          box.querySelector('textarea').value            = '';
          newBtn.innerHTML = 'Send <span class="arr">→</span>';
          newBtn.disabled    = false;
        }, 1800);
      }

      function onError() {
        titleEl.textContent = 'Error — try again';
        newBtn.innerHTML  = 'Send <span class="arr">→</span>';
        newBtn.disabled     = false;
        setTimeout(function () { titleEl.textContent = 'Get in touch'; }, 3000);
      }

      if (formspree) {
        fetch(formspree, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ name: nameVal, email: emailVal, message: msgVal })
        }).then(function(r){ return r.ok ? onSuccess() : onError(); }).catch(onError);
      } else {
        // Fallback: mailto
        var sub  = encodeURIComponent('Portfolio contact: ' + nameVal);
        var body = encodeURIComponent('From: ' + nameVal + '\nEmail: ' + emailVal + '\n\n' + msgVal);
        window.open('mailto:' + toEmail + '?subject=' + sub + '&body=' + body);
        onSuccess();
      }
    });
  }

  initContactForm();
})();
</script>
